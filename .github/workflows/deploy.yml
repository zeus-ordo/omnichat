name: Build And Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose -f docker-compose.yml config --quiet

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.PROD_HOST != '' && secrets.PROD_USER != '' && secrets.PROD_SSH_KEY != '' }}
    steps:
      - name: Deploy to production host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ~/omnichat
            git fetch --all
            git reset --hard origin/master
            docker-compose up -d --build api admin-dashboard nginx
            bash scripts/smoke-test.sh https://omnichat.ordoai.co superadmin@omnichat.ordoai.co OmniAdmin@2026!
