version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: omnibot-db
    environment:
      POSTGRES_USER: ${DB_USER:-omnibot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-omnibot_secure_pass}
      POSTGRES_MULTIPLE_DATABASES: omnibot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnibot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnibot-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: omnibot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - omnibot-network

  # Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: omnibot-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - omnibot-network

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: omnibot-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - admin-dashboard
      - chat-widget
    networks:
      - omnibot-network

  # API Service (NestJS)
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: omnibot-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-omnibot}:${DB_PASSWORD:-omnibot_secure_pass}@postgres:5432/omnibot
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    # volumes:
    #   - ./services/api:/app
    #   - /app/node_modules
    networks:
      - omnibot-network
    restart: unless-stopped

  # AI Engine (Python FastAPI)
  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: omnibot-ai-engine
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql://${DB_USER:-omnibot}:${DB_PASSWORD:-omnibot_secure_pass}@postgres:5432/omnibot
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    # volumes:
    #   - ./services/ai-engine:/app
    #   - /app/.venv
    networks:
      - omnibot-network
    restart: unless-stopped

  # Admin Dashboard (React)
  admin-dashboard:
    build:
      context: ./services/admin-dashboard
      dockerfile: Dockerfile
    container_name: omnibot-admin
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/api}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      - api
    networks:
      - omnibot-network
    restart: unless-stopped

  # Chat Widget (React - embeddable)
  chat-widget:
    build:
      context: ./services/chat-widget
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: omnibot-widget
    ports:
      - "5174:80"
    networks:
      - omnibot-network
    restart: unless-stopped

  # Message Queue (RabbitMQ)

  # Message Queue (RabbitMQ)
  # Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: omnibot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-omnibot}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-omnibot_rabbitmq_pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - omnibot-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  rabbitmq_data:

networks:
  omnibot-network:
    driver: bridge
