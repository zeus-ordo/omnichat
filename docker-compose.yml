version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnibot-db
    environment:
      POSTGRES_USER: omnibot
      POSTGRES_PASSWORD: omnibot_secure_pass
      POSTGRES_DB: omnibot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnibot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnibot-network

  redis:
    image: redis:7-alpine
    container_name: omnibot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - omnibot-network

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: omnibot-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - omnibot-network

  nginx:
    image: nginx:alpine
    container_name: omnibot-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - admin-dashboard
      - chat-widget
    networks:
      - omnibot-network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: omnibot-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://omnibot:omnibot_secure_pass@postgres:5432/omnibot
      REDIS_URL: redis://redis:6379
      JWT_SECRET: omnibot-secret-key-12345
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: 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
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - omnibot-network
    restart: unless-stopped

  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: omnibot-ai-engine
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql://omnibot:omnibot_secure_pass@postgres:5432/omnibot
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: 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
      QDRANT_URL: http://qdrant:6333
      DEFAULT_MODEL: gpt-4o
      EMBEDDING_MODEL: text-embedding-3-small
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - omnibot-network
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ./services/admin-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://57.180.64.19:8080/api
    container_name: omnibot-admin
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - api
    networks:
      - omnibot-network
    restart: unless-stopped

  chat-widget:
    build:
      context: ./services/chat-widget
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://57.180.64.19:8080/api
    container_name: omnibot-widget
    ports:
      - "5174:80"
    networks:
      - omnibot-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: omnibot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: omnibot
      RABBITMQ_DEFAULT_PASS: omnibot_rabbitmq_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - omnibot-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  rabbitmq_data:

networks:
  omnibot-network:
    driver: bridge
