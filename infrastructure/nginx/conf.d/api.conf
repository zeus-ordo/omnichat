# API Gateway Configuration
server {
    listen 80;
    server_name omnichat.ordoai.co localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK";
    }

    # API Routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # AI Engine Routes
    location /ai/ {
        limit_req zone=api burst=30 nodelay;
        
        proxy_pass http://ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Backward compatibility for old /admin URL
    location = /admin {
        return 301 /;
    }

    # Backward compatibility for old /admin/assets/* build paths
    location /admin/assets/ {
        proxy_pass http://admin_backend/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backward compatibility for /admin/*
    location /admin/ {
        return 301 /;
    }

    # Chat Widget
    location /widget/ {
        proxy_pass http://widget_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        add_header X-Frame-Options "ALLOW-FROM *" always;
    }

    # Widget JS
    location = /widget.js {
        proxy_pass http://widget_backend/widget.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Admin Dashboard at root
    location / {
        proxy_pass http://admin_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
